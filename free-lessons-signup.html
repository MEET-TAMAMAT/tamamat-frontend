<body class="index-page">
  <main class="main">

    <!-- Home -->
    <section id="home" class="hero section">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card shadow p-4">

        <h3 class="mb-3">Попередній запис на безкоштовні заняття</h3>

        <p>⌛ Тривалість: Мінімум один місяць (8 занять)<br>
        📅 Період навчання: березень - квітень</p>
        <p>Після заповнення форми ми зв’яжемось з вами, щоб уточнити рівень та час.</p>

        <form>

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control" required>
          </div>

          <!-- Name -->
          <div class="mb-3">
            <label class="form-label">Прізвище та ім'я *</label>
            <input type="text" class="form-control" required>
          </div>

          <!-- Age -->
          <div class="mb-3">
            <label class="form-label">Вік *</label>
            <input type="number" class="form-control" required>
          </div>

          <!-- Time Slots -->
          <div class="mb-4">
            <label class="form-label">Виберіть усі часові проміжки, коли вам зручно (за київським часом) *</label>
            <div class="table-responsive">
              <table class="table table-bordered text-center align-middle">
                <thead>
                  <tr>
                    <th></th>
                    <th>09:00-10:00</th>
                    <th>10:00-11:00</th>
                    <th>Не можу</th>
                  </tr>
                </thead>
                <tbody>
                  <tr><th>Пн</th><td><input type="checkbox"></td><td><input type="checkbox"></td><td><input type="checkbox"></td></tr>
                  <tr><th>Вт</th><td><input type="checkbox"></td><td><input type="checkbox"></td><td><input type="checkbox"></td></tr>
                  <tr><th>Ср</th><td><input type="checkbox"></td><td><input type="checkbox"></td><td><input type="checkbox"></td></tr>
                  <tr><th>Чт</th><td><input type="checkbox"></td><td><input type="checkbox"></td><td><input type="checkbox"></td></tr>
                  <tr><th>Пт</th><td><input type="checkbox"></td><td><input type="checkbox"></td><td><input type="checkbox"></td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Level -->
          <div class="mb-4">
            <label class="form-label">Рівень володіння англійською *</label>
            <div class="d-flex justify-content-between">
              <span>Початковий</span>
              <span>Вільне володіння</span>
            </div>
            <input type="range" class="form-range" min="1" max="5">
          </div>

          <!-- Contact Method -->
          <div class="mb-3">
            <label class="form-label">Як з вами зв'язатися? *</label>
            <textarea class="form-control" rows="3" 
            placeholder="Telegram/Instagram: @username
Viber/WhatsApp: +380XXXXXXXXX"></textarea>
          </div>

          <!-- Contact Time -->
          <div class="mb-3">
            <label class="form-label">Коли з вами зручно зв’язатися? *</label>
            <textarea class="form-control" rows="3" placeholder="Пн–Пт, 16:00–19:00, UTC+2"></textarea>
          </div>

          <!-- Confirmation -->
          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" required>
            <label class="form-check-label">
              Я підтверджую, що готовий(а) регулярно відвідувати заняття та маю необхідні технічні умови
</div>
    </section>
    <!-- /Home Section -->

  </main>



  
 
</body>

</html>
